services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - smartagro-net

  redpanda-console:
    image: redpandadata/console:v3.5.3
    container_name: kafka-console
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: kafka:19092
      SCHEMAREGISTRY_ENABLED: "false"
    networks:
      - smartagro-net

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: smartagro
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 768M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - smartagro-net

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: hadesarchitect-cassandra-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - cassandra
    networks:
      - smartagro-net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - smartagro-net

  spark-master:
    build:
      context: ./greenhouse/spark
    image: smartagro-spark:latest
    container_name: spark-master
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      PYSPARK_PYTHON: python3
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./greenhouse:/opt/project/greenhouse
    depends_on:
      - kafka
      - cassandra
    networks:
      - smartagro-net

  spark-worker-1:
    image: smartagro-spark:latest
    container_name: spark-worker-1
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      PYSPARK_PYTHON: python3
    ports:
      - "8081:8081"
    volumes:
      - ./greenhouse:/opt/project/greenhouse
    depends_on:
      - spark-master
    networks:
      - smartagro-net

volumes:
  kafka-data:
  cassandra-data:
  grafana-data:
  minio-data:

networks:
  smartagro-net:
    driver: bridge
